<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>住民問い合わせ | Emotion City OS</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="resident-view resident-page">
      <div class="phone-frame">
        <div class="phone-status">
          <span>9:41</span>
          <span>習志野市</span>
          <a href="./admin.html">管理者</a>
        </div>
        <div class="mobile-hero">
          <p class="eyebrow">習志野市 住民向けスマホ画面</p>
          <h1>危ない場所や気になることを送信</h1>
          <p>道路・街灯・公園・河川など、写真なしでも投稿できます。</p>
        </div>

        <form id="inquiryForm" class="inquiry-form">
          <label>
            <span>場所</span>
            <input id="place" name="place" required placeholder="例：津田沼駅 北口ロータリー" />
          </label>

          <label>
            <span>カテゴリ</span>
            <select id="category" name="category">
              <option>道路・歩道</option>
              <option>街灯</option>
              <option>公園</option>
              <option>河川・排水</option>
              <option>防災・避難</option>
              <option>その他</option>
            </select>
          </label>

          <label>
            <span>内容</span>
            <textarea id="message" name="message" required rows="5" placeholder="例：歩道の段差が大きく、夜に高齢者がつまずきそうです。"></textarea>
          </label>

          <fieldset>
            <legend>体感の不安度（AI判定の参考情報）</legend>
            <div class="segmented">
              <label><input type="radio" name="risk" value="低" />低</label>
              <label><input type="radio" name="risk" value="中" checked />中</label>
              <label><input type="radio" name="risk" value="高" />高</label>
            </div>
          </fieldset>

          <button class="primary-action" type="submit">問い合わせを送信</button>
        </form>

        <div class="receipt-panel" id="receiptPanel" hidden>
          <div>
            <p class="eyebrow">受付完了</p>
            <h2 id="receiptTitle">問い合わせを受け付けました</h2>
          </div>
          <dl id="receiptSummary"></dl>
        </div>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
